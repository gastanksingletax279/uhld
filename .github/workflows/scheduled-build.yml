name: Scheduled Monthly Build

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate date tag
        id: date
        run: echo "tag=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scheduled-${{ steps.date.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Check Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Dependabot Security Alerts" >> "$GITHUB_STEP_SUMMARY"
          ALERTS=$(gh api "repos/$GITHUB_REPOSITORY/dependabot/alerts?state=open&per_page=100" 2>/dev/null || echo "[]")
          COUNT=$(echo "$ALERTS" | python3 -c "import sys, json; data=json.load(sys.stdin); print(len(data) if isinstance(data, list) else 0)" 2>/dev/null || echo "0")
          if [ "$COUNT" = "0" ]; then
            echo "No open Dependabot alerts found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**$COUNT open alert(s) found:**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$ALERTS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if isinstance(data, list):
              for a in data[:20]:
                  sev = a.get('security_advisory', {}).get('severity', 'unknown')
                  pkg = a.get('dependency', {}).get('package', {}).get('name', 'unknown')
                  summary = a.get('security_advisory', {}).get('summary', '')
                  print(f'- **{sev.upper()}** \`{pkg}\`: {summary}')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "Could not parse alert details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create scheduled build issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_TAG="${{ steps.date.outputs.tag }}"
          LABEL_EXISTS=$(gh label list --json name -q '.[].name' 2>/dev/null | grep -x 'scheduled-build' || true)
          if [ -n "$LABEL_EXISTS" ]; then
            gh issue create \
              --title "Scheduled build completed — ${DATE_TAG}" \
              --body "The monthly scheduled Docker image build completed successfully on ${DATE_TAG}. Images pushed: \`latest\` and \`scheduled-${DATE_TAG}\`." \
              --label "scheduled-build" || true
          else
            gh issue create \
              --title "Scheduled build completed — ${DATE_TAG}" \
              --body "The monthly scheduled Docker image build completed successfully on ${DATE_TAG}. Images pushed: \`latest\` and \`scheduled-${DATE_TAG}\`." || true
          fi
